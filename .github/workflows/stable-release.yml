name: Stable Release

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  stable-release:
    name: Publish stable release
    if: github.event.pull_request.merged == true && (startsWith(github.event.pull_request.head.ref, 'beta/') || startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality checks
        run: |
          bun run type-check
          bun run lint
          bun run format:check

      - name: Derive stable version tag
        id: tag
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$BRANCH" == beta/* ]]; then
            VERSION="${BRANCH#beta/}"
          elif [[ "$BRANCH" == hotfix/* ]]; then
            VERSION="${BRANCH#hotfix/}"
          fi
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Stable version: v${VERSION}"

      - name: Build
        run: bun run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/dashboard"
          docker build -t "${IMAGE}:${{ steps.tag.outputs.version }}" \
                       -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${{ steps.tag.outputs.version }}"
          docker push "${IMAGE}:latest"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.version }}
          git push origin ${{ steps.tag.outputs.version }}

      - name: Create stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          prerelease: false
          generate_release_notes: true

  trigger-backport:
    name: Trigger backport to develop
    needs: stable-release
    uses: ./.github/workflows/backport.yml
    with:
      version: ${{ needs.stable-release.outputs.version }}
    permissions:
      contents: write
      pull-requests: write
