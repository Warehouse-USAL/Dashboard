services:
  dashboard:
    image: ghcr.io/warehouse-usal/dashboard:latest
    environment:
      # Dashboard reaches the backend through the reverse proxy path.
      # nginx proxy_pass needs a full upstream URL (scheme+host), not a path.
      # The backend container is reachable by name on the shared wh-proxy network.
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
    restart: always
    networks:
      - wh-proxy
    # No host port: the Caddy reverse proxy owns :80 and routes to this
    # container by name (dashboard:80) over the shared wh-proxy network.

networks:
  wh-proxy:
    external: true
